<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Console Pro</title>
    <link rel="stylesheet" href="style.css?v=1.4">
</head>
<body>

    <div class="workspace-grid"></div>

    <div class="console-body">
        <div class="screen-container">
            <div class="bezel-middle-row">
                <div class="screen">
                    <div class="screen-matrix-overlay"></div>
                    <div class="screen-status-bar">
                        <span>.▲▮▮- 12:37 95%</span>
                        <span>[▮▮▮▮]</span>
                    </div>
                    <div class="game-viewport">
                        <ul class="retro-menu">
                            <li class="menu-item active">▶ Snake II</li>
                            <li class="menu-item">Contacts</li>
                            <li class="menu-item">Messages</li>
                            <li class="menu-item">Settings</li>
                            <li class="menu-item">About</li>
                        </ul>
                    </div>
                    <div class="screen-footer-bar">
                        <span>Menu</span>
                        <span>Back</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="brand-logo-text">
            <span class="brand-main">RETRO</span>
            <span class="brand-sub">CONSOLE<sup> PRO</sup></span>
        </div>

        <div class="controls-container">
            
            <div class="dpad-wrapper">
                <div class="dpad">
                    <button class="dpad-btn up" id="btn-up"></button>
                    <button class="dpad-btn left" id="btn-left"></button>
                    <div class="dpad-center"></div>
                    <button class="dpad-btn right" id="btn-right"></button>
                    <button class="dpad-btn down" id="btn-down"></button>
                    
                    <div class="center-pivot-recess"></div>
                </div>
            </div>

            <div class="action-buttons-zone">
                <div class="btn-label-pair position-b">
                    <button class="action-btn btn-b" id="btn-b">B</button>
                    <span class="chassis-btn-label">B</span>
                </div>
                <div class="btn-label-pair position-a">
                    <button class="action-btn btn-a" id="btn-a">A</button>
                    <span class="chassis-btn-label">A</span>
                </div>
            </div>

        </div>

        <div class="menu-buttons-deck">
            <div class="pill-pair">
                <button class="pill-btn" id="btn-select"></button>
                <span>SELECT</span>
            </div>
            <div class="pill-pair">
                <button class="pill-btn" id="btn-start"></button>
                <span>START</span>
            </div>
        </div>

        <div class="speaker-grille">
            <div class="slit"></div>
            <div class="slit"></div>
            <div class="slit"></div>
            <div class="slit"></div>
            <div class="slit"></div>
            <div class="slit"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
