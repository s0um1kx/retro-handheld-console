<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Console Pro</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>

    <div class="workspace-grid"></div>

    <div class="console-body">
        <div class="accent-line-left"></div>
        <div class="accent-line-right"></div>

        <div class="screen-container">
            <div class="screen">
                <div class="screen-matrix-overlay"></div>
                <div class="screen-header">
                    <span class="status-indicator">● MATRIX OS</span>
                    <span class="score-counter">000000</span>
                </div>
                <div class="game-viewport" id="game-canvas">
                    <div class="menu-ui">
                        <h1 class="game-title">SNAKE SYSTEM</h1>
                        <p class="blink-prompt">PRESS START</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-container">
            
            <div class="dpad-wrapper">
                <div class="dpad">
                    <button class="dpad-btn up" id="btn-up"></button>
                    <button class="dpad-btn left" id="btn-left"></button>
                    <div class="dpad-center">
                        <div class="center-dimple"></div>
                    </div>
                    <button class="dpad-btn right" id="btn-right"></button>
                    <button class="dpad-btn down" id="btn-down"></button>
                </div>
            </div>

            <div class="action-buttons-deck">
                <div class="action-buttons-housing">
                    <div class="btn-label-pair">
                        <button class="action-btn btn-b" id="btn-b"></button>
                        <span>B</span>
                    </div>
                    <div class="btn-label-pair">
                        <button class="action-btn btn-a" id="btn-a"></button>
                        <span>A</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="menu-buttons-deck">
            <div class="pill-pair">
                <button class="pill-btn" id="btn-select"></button>
                <span>SELECT</span>
            </div>
            <div class="pill-pair">
                <button class="pill-btn" id="btn-start"></button>
                <span>START</span>
            </div>
        </div>

        <div class="speaker-grille">
            <div class="slit"></div>
            <div class="slit"></div>
            <div class="slit"></div>
            <div class="slit"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
